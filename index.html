<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沖縄ドライブルートマップ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <style>
        /* カスタムアイコンのスタイル */
        .custom-div-icon {
            background-color: #3b82f6; /* Tailwind blue-500 */
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            text-align: center;
            line-height: 24px; /* Icon size - border */
            font-size: 11px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .custom-div-icon.start-end {
            background-color: #ef4444; /* Tailwind red-500 */
        }
        
        /* 地図の高さ調整 */
        #map {
            height: 100%;
            min-height: 400px;
            z-index: 10;
        }

        /* スクロールバーのカスタマイズ */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans text-gray-800">

    <!-- Header -->
    <header class="bg-blue-600 text-white p-4 shadow-md z-20">
        <h1 class="text-xl font-bold">スケジュール沖縄(案) - ドライブルート</h1>
        <p class="text-sm opacity-90">2026/6/5 (金) のスケジュール地図（9:00レンタカー借出 / 18:00返却）</p>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        
        <!-- Sidebar: Timeline -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-white border-r border-gray-200 flex flex-col h-1/2 md:h-full">
            <div class="p-3 bg-gray-100 border-b border-gray-200 font-semibold text-gray-700 flex justify-between items-center flex-shrink-0">
                <span>タイムライン</span>
                <span class="text-xs bg-blue-100 text-blue-800 py-0.5 px-2 rounded-full">全15地点</span>
            </div>
            
            <div class="flex-1 overflow-y-auto p-3 custom-scrollbar" id="timeline-container">
                <!-- Timeline items will be injected here -->
            </div>
        </aside>

        <!-- Map Container -->
        <section class="w-full md:w-2/3 lg:w-3/4 h-1/2 md:h-full relative">
            <div id="map"></div>
            <!-- 全体表示ボタン -->
            <button id="reset-view-btn" class="absolute bottom-6 right-6 z-[1000] bg-white p-3 rounded-full shadow-lg text-gray-700 hover:bg-blue-50 hover:text-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-500 border border-gray-200 transition-colors hidden" title="ルート全体を表示">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                </svg>
            </button>
        </section>

    </main>

    <script>
        // 9:00レンタカー手続き開始に合わせて完全に最適化されたスケジュール
        const scheduleData = [
            { id: 1, name: "ホテルJALシティ那覇", time: "8:00発", action: "出発", lat: 26.215878, lng: 127.685875, address: "沖縄県那覇市牧志1-3-70", website: "https://www.naha.jalcity.co.jp/", transitNext: "徒歩12分 (0.9km)", isTerminal: true },
            { id: 2, name: "那覇市役所", time: "8:12着 / 8:22発", action: "名建築を外観見学", lat: 26.212100, lng: 127.679100, address: "沖縄県那覇市泉崎1-1-1", website: "https://www.city.naha.okinawa.jp/", transitNext: "徒歩2分 (0.15km)", isTerminal: false },
            { id: 3, name: "沖縄県庁", time: "8:24着 / 8:34発", action: "周辺散策", lat: 26.212500, lng: 127.680900, address: "沖縄県那覇市泉崎1-2-2", website: "https://www.pref.okinawa.lg.jp/", transitNext: "徒歩13分 (1.0km)", isTerminal: false },
            { id: 4, name: "オリックスレンタカー 沖縄美栄橋店", time: "8:47着 / 9:00発", action: "レンタカー借", lat: 26.216649, lng: 127.685932, address: "沖縄県那覇市牧志2-17-12 いとみね會館 1F", website: "https://car.orix.co.jp/shops/?shops_pk=784", transitNext: "車で50分 (23.5km)", isTerminal: false },
            { id: 5, name: "道の駅かでな", time: "9:50着 / 10:20発", action: "観光・休憩 (30分)", lat: 26.368070, lng: 127.774210, address: "沖縄県中頭郡嘉手納町屋良1026-3", website: "https://michinoeki-kadena.jp/", transitNext: "車で10分 (6.24km)", isTerminal: false },
            { id: 6, name: "陶眞窯", time: "10:30着 / 11:00発", action: "やちむん陶芸見学 (30分)", lat: 26.402800, lng: 127.746600, address: "沖縄県中頭郡読谷村座喜味2898-4", website: "https://tousingama.com/", transitNext: "車で16分 (9.4km)", isTerminal: false },
            { id: 7, name: "花笠", time: "11:16着 / 12:20発", action: "昼食", lat: 26.436200, lng: 127.716800, address: "沖縄県中頭郡読谷村宇座657-1", website: "https://tabelog.com/okinawa/A4703/A470304/47007472/", transitNext: "車で10分 (5.0km)", isTerminal: false },
            { id: 8, name: "座喜味城跡", time: "12:30着 / 13:00発", action: "世界遺産見学 (30分)", lat: 26.407900, lng: 127.742100, address: "沖縄県中頭郡読谷村座喜味708-6", website: "http://www.yuntanza-museum.jp/", transitNext: "車で17分 (9.6km)", isTerminal: false },
            { id: 9, name: "琉冰 おんなの駅", time: "13:17着 / 13:45発", action: "スイーツ・休憩 (28分)", lat: 26.436157, lng: 127.794833, address: "沖縄県国頭郡恩納村仲泊1656-9", website: "https://onnanoeki.com/", transitNext: "車で43分 (21.2km)", isTerminal: false },
            { id: 10, name: "道の駅 あやはし館", time: "14:28着 / 14:50発", action: "海中道路ドライブ (22分)", lat: 26.331500, lng: 127.930400, address: "沖縄県うるま市与那城屋平4", website: "https://uruma-ru.jp/member/uminoekiayahashikan/", transitNext: "車で30分 (16.0km)", isTerminal: false },
            { id: 11, name: "中村家住宅", time: "15:20着 / 15:50発", action: "重要文化財見学 (30分)", lat: 26.289700, lng: 127.798100, address: "沖縄県中頭郡北中城村大城106", website: "https://www.nakamurake.net/", transitNext: "車で30分 (18.5km)", isTerminal: false },
            { id: 12, name: "沖縄県立博物館・美術館", time: "16:20着 / 16:30発", action: "建物外観鑑賞 (10分)", lat: 26.227500, lng: 127.694200, address: "沖縄県那覇市おもろまち3-1-1", website: "https://okimu.jp/", transitNext: "車で3分 (0.8km)", isTerminal: false },
            { id: 13, name: "セルフ那覇新都心 アポロステーション", time: "16:33着 / 16:45発", action: "給油", lat: 26.225100, lng: 127.696100, address: "沖縄県那覇市おもろまち4-21-22", website: "", transitNext: "車で10分 (2.5km)", isTerminal: false },
            { id: 14, name: "オリックスレンタカー 沖縄美栄橋店", time: "16:55着", action: "レンタカー返却", lat: 26.216649, lng: 127.685932, address: "沖縄県那覇市牧志2-17-12 いとみね會館 1F", website: "https://car.orix.co.jp/shops/?shops_pk=784", transitNext: "徒歩6分 (0.46km)", isTerminal: false },
            { id: 15, name: "ホテルJALシティ那覇", time: "17:01着", action: "到着", lat: 26.215878, lng: 127.685875, address: "沖縄県那覇市牧志1-3-70", website: "https://www.naha.jalcity.co.jp/", isTerminal: true }
        ];

        let map;
        let markers = [];

        // 初期化処理
        function initMap() {
            // 地図の初期化 (沖縄本島中心付近)
            map = L.map('map').setView([26.32, 127.8], 11);

            // OpenStreetMapのタイルレイヤーを追加
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            const timelineContainer = document.getElementById('timeline-container');
            const latlngs = [];

            // 各地点の処理
            scheduleData.forEach((point, index) => {
                // 座標を配列に追加（ルート線用）
                latlngs.push([point.lat, point.lng]);

                // マーカーの作成
                const isStartOrEnd = point.id === 1 || point.id === scheduleData.length;
                const iconClass = isStartOrEnd ? 'custom-div-icon start-end' : 'custom-div-icon';
                const label = point.id; // 地図上の番号 (1から15)

                const customIcon = L.divIcon({
                    className: iconClass,
                    html: label,
                    iconSize: [28, 28],
                    iconAnchor: [14, 14]
                });

                const marker = L.marker([point.lat, point.lng], { icon: customIcon }).addTo(map);
                markers.push(marker);

                // ポップアップの設定
                const websiteLinkPopup = point.website ? `
                    <a href="${point.website}" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:underline inline-flex items-center mt-2 text-xs">
                        <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        WEBサイトを開く
                    </a>` : '';

                const popupContent = `
                    <div class="font-sans min-w-[200px]">
                        <strong class="text-blue-600 text-sm block mb-1">No.${label} ${point.name}</strong>
                        <div class="text-xs text-gray-600 mb-1">⏰ ${point.time}</div>
                        <div class="text-[11px] bg-gray-100 p-1 rounded inline-block text-gray-500 mb-2">${point.action}</div>
                        <div class="text-[11px] text-gray-600 flex items-start mt-1">
                            <svg class="w-3.5 h-3.5 mr-1 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                            <span class="break-all">${point.address}</span>
                        </div>
                        ${websiteLinkPopup}
                    </div>
                `;
                marker.bindPopup(popupContent);

                // タイムラインの要素作成
                const isLast = index === scheduleData.length - 1;
                const timelineItem = document.createElement('div');
                timelineItem.className = 'flex relative pb-7 cursor-pointer group';
                timelineItem.onclick = () => {
                    map.setView([point.lat, point.lng], 14);
                    marker.openPopup();
                    
                    // ハイライト表示
                    document.querySelectorAll('.timeline-card').forEach(el => el.classList.remove('border-blue-500', 'bg-blue-50'));
                    document.querySelectorAll('.timeline-card')[index].classList.add('border-blue-500', 'bg-blue-50');
                };

                // 公式サイトリンク（小さいアイコン化）
                const websiteIconTimeline = point.website ? `
                    <a href="${point.website}" target="_blank" rel="noopener noreferrer" class="text-blue-500 hover:text-blue-700 hover:bg-blue-50 p-1 rounded transition-colors ml-1" title="公式サイトを開く" onclick="event.stopPropagation();">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                    </a>` : '';

                // 移動手段のアイコン判別
                const isWalking = point.transitNext && point.transitNext.includes("徒歩");
                const transitIcon = isWalking ? '🚶' : '🚗';

                // 移動時間バッジのスリム化
                const transitInfo = !isLast ? `
                    <div class="absolute bottom-1.5 left-[24px] text-[9px] text-gray-600 font-medium flex items-center bg-white px-2 py-0.5 rounded-full border border-gray-200 shadow-sm z-10 whitespace-nowrap" onclick="event.stopPropagation();">
                        <span class="mr-1">${transitIcon}</span>
                        ${point.transitNext}
                    </div>
                ` : '';

                timelineItem.innerHTML = `
                    <!-- Line connecting points -->
                    ${!isLast ? '<div class="absolute top-4 left-[13px] bottom-0 w-0.5 bg-blue-200 group-hover:bg-blue-400 transition-colors"></div>' : ''}
                    
                    <!-- Circular Node -->
                    <div class="flex-shrink-0 w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold text-white z-10 ${isStartOrEnd ? 'bg-red-500' : 'bg-blue-500'} border-2 border-white shadow-sm mt-0.5">
                        ${label}
                    </div>
                    
                    <!-- Content Card (高さと余白をかなりカットしました) -->
                    <div class="ml-3 flex-1 bg-white border border-gray-200 rounded-lg py-1.5 px-2.5 shadow-sm hover:shadow-md transition-shadow timeline-card">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-gray-800 text-xs sm:text-sm leading-tight flex-1 truncate">${point.name}</h3>
                            ${websiteIconTimeline}
                        </div>
                        <div class="flex items-center justify-between mt-1 text-[10px] text-gray-500">
                            <div class="flex items-center">
                                <svg class="w-3 h-3 mr-0.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${point.time}
                            </div>
                            <span class="text-[9px] text-gray-500 bg-gray-50 px-1.5 py-0.5 rounded border border-gray-100">${point.action}</span>
                        </div>
                    </div>
                    
                    ${transitInfo}
                `;
                
                timelineContainer.appendChild(timelineItem);
            });

            // 経路の線を引く (Polyline)
            const polyline = L.polyline(latlngs, {
                color: '#3b82f6', // Tailwind blue-500
                weight: 4,
                opacity: 0.7,
                dashArray: '8, 8', // 点線にする
                lineJoin: 'round'
            }).addTo(map);

            const fitBoundsToRoute = () => {
                map.fitBounds(polyline.getBounds(), { padding: [50, 50] });
            };

            // すべてのマーカーとルートが収まるように地図の表示範囲を調整
            // 画面のレイアウトが完了してからフィットさせるために少し遅延させます
            setTimeout(() => {
                map.invalidateSize(); // 地図のサイズを再計算
                fitBoundsToRoute();
            }, 100);

            // 全体表示ボタンの設定
            const resetBtn = document.getElementById('reset-view-btn');
            resetBtn.classList.remove('hidden');
            resetBtn.addEventListener('click', () => {
                fitBoundsToRoute();
                // 選択状態の解除・ポップアップを閉じる
                document.querySelectorAll('.timeline-card').forEach(el => el.classList.remove('border-blue-500', 'bg-blue-50'));
                markers.forEach(m => m.closePopup());
            });
        }

        // DOM読み込み後に初期化
        document.addEventListener('DOMContentLoaded', initMap);

    </script>
</body>
</html>
