<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沖縄ドライブルートマップ</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 全体のスクロールを防ぐ */
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 10;
        }
        .custom-marker {
            background-color: #2563eb; /* Tailwind blue-600 */
            color: white;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-weight: bold;
            font-size: 14px;
            border: 2px solid white;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        .custom-marker:hover {
            transform: scale(1.1);
            background-color: #1d4ed8; /* Tailwind blue-700 */
        }
        /* カスタムスクロールバー */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="bg-gray-50 flex flex-col font-sans text-gray-800">

    <!-- ヘッダー -->
    <header class="bg-blue-600 text-white p-4 shadow-md z-20 flex-shrink-0">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="ph ph-map-trifold text-2xl"></i>
                <h1 class="text-xl font-bold tracking-wider">沖縄ドライブルート</h1>
            </div>
            <button onclick="resetMapView()" class="bg-white text-blue-600 hover:bg-blue-50 px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1 shadow transition-colors whitespace-nowrap active:scale-95">
                <i class="ph ph-arrows-out text-lg"></i>
                <span class="hidden sm:inline">全体を表示</span>
                <span class="sm:hidden">全体</span>
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <main class="flex flex-col md:flex-row flex-1 overflow-hidden">
        
        <!-- スケジュールリスト (サイドバー) -->
        <aside class="w-full md:w-1/3 lg:w-1/4 bg-white shadow-lg overflow-y-auto z-20 flex-shrink-0 border-r border-gray-200">
            <!-- スクロール時に固定されないよう、stickyクラスを削除 -->
            <div class="p-4 border-b border-gray-100 bg-gray-50">
                <h2 class="text-lg font-semibold text-gray-700 flex items-center gap-2">
                    <i class="ph ph-calendar-check text-blue-600"></i>
                    ツアースケジュール
                </h2>
                <p class="text-xs text-gray-600 mt-1 font-medium" id="spot-count"></p>
            </div>
            
            <div class="p-4" id="schedule-list">
                <!-- JavaScriptでスケジュールをここに生成します -->
            </div>
        </aside>

        <!-- マップエリア -->
        <section class="w-full md:w-2/3 lg:w-3/4 flex-1 relative">
            <div id="map"></div>
        </section>

    </main>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        const scheduleData = [
            { id: 1, displayLabel: 1, name: "ホテルJALシティ那覇", time: "8:00発", action: "出発", lat: 26.215878, lng: 127.685875, address: "沖縄県那覇市牧志1-3-70", website: "https://www.naha.jalcity.co.jp/", transitNext: "徒歩12分 (0.9km)", isTerminal: true },
            { id: 2, displayLabel: 2, name: "那覇市役所", time: "8:12着 / 8:22発", action: "外観見学 (10分)", lat: 26.212100, lng: 127.679100, address: "沖縄県那覇市泉崎1-1-1", website: "https://www.city.naha.okinawa.jp/", transitNext: "徒歩2分 (0.15km)", isTerminal: false },
            { id: 3, displayLabel: 3, name: "沖縄県庁", time: "8:24着 / 8:34発", action: "外観見学 (10分)", lat: 26.212500, lng: 127.680900, address: "沖縄県那覇市泉崎1-2-2", website: "https://www.pref.okinawa.lg.jp/", transitNext: "徒歩13分 (1.0km)", isTerminal: false },
            { id: 4, displayLabel: 4, name: "オリックスレンタカー", time: "8:47着 / 9:00発", action: "レンタカー借出 (13分)", lat: 26.216649, lng: 127.685932, address: "沖縄県那覇市牧志2-17-12 いとみね會館 1F", website: "https://car.orix.co.jp/shops/?shops_pk=784", transitNext: "車で15分 (5.0km)", isTerminal: false },
            { id: 5, displayLabel: 5, name: "浦添西海岸PARCO CITY", time: "9:15着 / 9:30発", action: "お買い物 (15分)", lat: 26.262500, lng: 127.696600, address: "沖縄県浦添市西洲3-1-1", website: "https://www.parcocity.jp/", transitNext: "車で40分 (20.0km)", isTerminal: false },
            { id: 6, displayLabel: 6, name: "道の駅かでな", time: "10:10着 / 10:40発", action: "観光・休憩 (30分)", lat: 26.368070, lng: 127.774210, address: "沖縄県中頭郡嘉手納町屋良1026-3", website: "https://michinoeki-kadena.jp/", transitNext: "車で10分 (6.24km)", isTerminal: false },
            { id: 7, displayLabel: 7, name: "陶眞窯", time: "10:50着 / 11:20発", action: "やちむん見学 (30分)", lat: 26.402800, lng: 127.746600, address: "沖縄県中頭郡読谷村座喜味2898-4", website: "https://tousingama.com/", transitNext: "車で10分 (5.0km)", isTerminal: false },
            { id: 8, displayLabel: 8, name: "花笠", time: "11:30着 / 12:30発", action: "昼食 (60分)", lat: 26.436200, lng: 127.716800, address: "沖縄県中頭郡読谷村宇座657-1", website: "https://tabelog.com/okinawa/A4703/A470304/47007472/", transitNext: "車で10分 (5.0km)", isTerminal: false },
            { id: 9, displayLabel: 9, name: "座喜味城跡", time: "12:40着 / 13:10発", action: "世界遺産見学 (30分)", lat: 26.407900, lng: 127.742100, address: "沖縄県中頭郡読谷村座喜味708-6", website: "http://www.yuntanza-museum.jp/", transitNext: "車で17分 (9.6km)", isTerminal: false },
            { id: 10, displayLabel: 10, name: "琉冰 おんなの駅", time: "13:27着 / 13:42発", action: "休憩 (15分)", lat: 26.436157, lng: 127.794833, address: "沖縄県国頭郡恩納村仲泊1656-9", website: "https://onnanoeki.com/", transitNext: "車で43分 (21.2km)", isTerminal: false },
            { id: 11, displayLabel: 11, name: "道の駅 あやはし館", time: "14:25着 / 14:50発", action: "海中道路走行 (25分)", lat: 26.331500, lng: 127.930400, address: "沖縄県うるま市与那城屋平4", website: "https://uruma-ru.jp/member/uminoekiayahashikan/", transitNext: "車で30分 (16.0km)", isTerminal: false },
            { id: 12, displayLabel: 12, name: "中村家住宅", time: "15:20着 / 15:50発", action: "重要文化財見学 (30分)", lat: 26.289700, lng: 127.798100, address: "沖縄県中頭郡北中城村大城106", website: "https://www.nakamurake.net/", transitNext: "車で30分 (18.5km)", isTerminal: false },
            { id: 13, displayLabel: 13, name: "沖縄県立博物館・美術館", time: "16:20着 / 16:30発", action: "外観見学 (10分)", lat: 26.227500, lng: 127.694200, address: "沖縄県那覇市おもろまち3-1-1", website: "https://okimu.jp/", transitNext: "車で3分 (0.8km)", isTerminal: false },
            { id: 14, displayLabel: 14, name: "ガソリンスタンド", time: "16:33着 / 16:43発", action: "給油 (10分)", lat: 26.225100, lng: 127.696100, address: "沖縄県那覇市おもろまち4-21-22", website: "", transitNext: "車で10分 (2.5km)", isTerminal: false },
            { id: 15, displayLabel: 15, name: "オリックスレンタカー", time: "16:53着", action: "レンタカー返却", lat: 26.216649, lng: 127.685932, address: "沖縄県那覇市牧志2-17-12 いとみね會館 1F", website: "https://car.orix.co.jp/shops/?shops_pk=784", transitNext: "徒歩6分 (0.46km)", isTerminal: false },
            { id: 16, displayLabel: 16, name: "ホテルJALシティ那覇", time: "16:59着", action: "到着", lat: 26.215878, lng: 127.685875, address: "沖縄県那覇市牧志1-3-70", website: "https://www.naha.jalcity.co.jp/", isTerminal: true }
        ];

        // マップの初期化
        // 最初の地点と最後の地点の中間あたりを初期の中心座標とする（概算）
        const map = L.map('map').setView([26.326, 127.760], 11);

        // OpenStreetMapタイルの追加
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // マーカーを保持する配列
        const markers = {};
        const latlngs = [];

        const scheduleListContainer = document.getElementById('schedule-list');
        const spotCountElement = document.getElementById('spot-count');
        
        // スポット数を動的に設定
        if (spotCountElement) {
            spotCountElement.textContent = `全${scheduleData.length}スポット`;
        }

        // カスタムアイコンを作成する関数
        const createCustomIcon = (number, isTerminal) => {
            const bgColor = isTerminal ? '#dc2626' : '#2563eb'; // 終着点は赤、その他は青
            const hoverColor = isTerminal ? '#b91c1c' : '#1d4ed8';
            return L.divIcon({
                className: '', // デフォルトのクラスを消すため空文字
                html: `<div class="custom-marker" style="background-color: ${bgColor}; width: 28px; height: 28px;">${number}</div>`,
                iconSize: [28, 28],
                iconAnchor: [14, 14],
                popupAnchor: [0, -14]
            });
        };

        // データをループしてマーカーとリストを作成
        scheduleData.forEach((spot, index) => {
            // 座標を配列に追加（ルート線を引くため）
            latlngs.push([spot.lat, spot.lng]);

            // マーカーを作成
            const marker = L.marker([spot.lat, spot.lng], {
                icon: createCustomIcon(spot.displayLabel, spot.isTerminal)
            }).addTo(map);

            // ポップアップのHTMLを構築
            let popupContent = `
                <div class="font-sans min-w-[200px]">
                    <div class="font-bold text-lg text-blue-800 border-b pb-1 mb-2 flex items-center gap-1">
                        <span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded-full">${spot.displayLabel}</span>
                        ${spot.name}
                    </div>
                    <div class="text-sm mb-1"><i class="ph ph-clock text-gray-500 mr-1"></i>${spot.time}</div>
                    <div class="text-sm mb-1"><i class="ph ph-person-simple-walk text-gray-500 mr-1"></i><span class="font-semibold text-red-600">${spot.action}</span></div>
                    <div class="text-xs text-gray-600 mb-2"><i class="ph ph-map-pin text-gray-500 mr-1"></i>${spot.address}</div>
            `;
            if (spot.website) {
                popupContent += `<a href="${spot.website}" target="_blank" class="text-xs text-blue-500 hover:underline flex items-center"><i class="ph ph-link mr-1"></i>公式サイトを開く</a>`;
            }
            popupContent += `</div>`;
            marker.bindPopup(popupContent);
            markers[spot.id] = marker;

            // スケジュールリストのアイテムを作成
            const listItem = document.createElement('div');
            listItem.className = 'relative pl-10 pb-1 mt-2';
            
            // 左側のタイムラインの線
            if (index !== scheduleData.length - 1) {
                listItem.innerHTML += `<div class="absolute left-4 top-8 bottom-[-0.5rem] w-0.5 bg-gray-300"></div>`;
            }

            // アイコン（リスト上の丸）
            const dotColor = spot.isTerminal ? 'bg-red-500' : 'bg-blue-600';
            
            // リストコンテンツのHTMLを構築
            let listContent = `
                <div class="absolute left-1 top-1 w-6 h-6 rounded-full ${dotColor} text-white flex items-center justify-center text-xs font-bold shadow-sm z-10 border-2 border-white ring-1 ring-gray-100">
                    ${spot.displayLabel}
                </div>
                <div class="bg-white border border-gray-200 rounded-lg p-2.5 shadow-sm hover:shadow-md transition-shadow cursor-pointer relative" onclick="focusOnSpot(${spot.id}, ${spot.lat}, ${spot.lng})">
                    <div class="flex justify-between items-start mb-2 gap-1">
                        <h3 class="font-bold text-gray-800 text-sm leading-tight">${spot.name}</h3>
                        <span class="text-[11px] bg-gray-50 text-gray-500 px-1.5 py-0.5 rounded border border-gray-200 whitespace-nowrap font-medium tracking-tight">${spot.time}</span>
                    </div>
                    <div>
                        <span class="inline-block bg-gray-800 text-white text-xs font-bold px-2 py-0.5 rounded">${spot.action}</span>
                    </div>
                </div>
            `;

            // 次の場所への移動情報
            if (spot.transitNext) {
                const isCar = spot.transitNext.includes('車');
                const iconClass = isCar ? 'ph-car' : 'ph-person-simple-walk';
                listContent += `
                    <div class="py-2.5 flex items-center text-xs font-medium">
                        <div class="absolute left-1.5 bg-white border border-gray-400 text-gray-800 rounded-full w-5 h-5 flex items-center justify-center z-10 shadow-sm">
                            <i class="ph ${iconClass} text-[11px] font-bold"></i>
                        </div>
                        <span class="text-gray-800 text-[11px] font-semibold bg-white px-2.5 py-0.5 rounded-full border border-gray-300 ml-1 shadow-sm">${spot.transitNext}</span>
                    </div>
                `;
            }

            listItem.innerHTML += listContent;
            scheduleListContainer.appendChild(listItem);
        });

        // 軌跡（ポリライン）を描画
        const polyline = L.polyline(latlngs, {
            color: '#3b82f6', // Tailwind blue-500
            weight: 4,
            opacity: 0.7,
            dashArray: '10, 10' // 破線にする場合
        }).addTo(map);

        // 全てのマーカーが収まるようにマップの表示領域を調整
        map.fitBounds(polyline.getBounds(), { padding: [50, 50] });

        // リストをクリックした時の関数
        window.focusOnSpot = function(id, lat, lng) {
            // マップを移動
            map.setView([lat, lng], 15, {
                animate: true,
                duration: 1
            });
            // ポップアップを開く
            markers[id].openPopup();

            // モバイルの場合はマップまでスクロールする
            if(window.innerWidth < 768) {
                document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
            }
        };

        // マップを全体表示に戻す関数
        window.resetMapView = function() {
            map.fitBounds(polyline.getBounds(), { 
                padding: [50, 50],
                animate: true,
                duration: 1 
            });
            map.closePopup(); // 開いているポップアップを閉じる
            
            // モバイルの場合はマップまでスクロールする
            if(window.innerWidth < 768) {
                document.getElementById('map').scrollIntoView({ behavior: 'smooth' });
            }
        };

        // ウィンドウリサイズ時にマップのサイズを再計算
        window.addEventListener('resize', () => {
            map.invalidateSize();
        });
    </script>
</body>
</html>
